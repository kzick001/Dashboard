<div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-cyan-500/20 p-6 hover-scale overflow-hidden group">
  <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-cyan-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>

  <a href="https://kzick001.github.io/dashboard/" class="absolute top-4 left-4 text-[10px] font-black text-cyan-800 hover:text-cyan-400 transition-colors tracking-tighter z-20">&larr; DASHBOARD</a>

  <header class="flex items-center gap-4 mb-6 mt-4">
    <div class="p-3 bg-cyan-950/60 border border-cyan-500/30 rounded-lg group-hover:animate-electric-pulse transition-all">
      <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
      </svg>
    </div>
    <h2 class="text-xl font-bold truncate text-slate-100 tracking-tight">SONIC_FORGE_V1.0</h2>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <div class="lg:col-span-2 relative aspect-video bg-black/40 rounded-lg border border-slate-800 overflow-hidden">
      <canvas id="visualizerCanvas" class="w-full h-full"></canvas>
      <div id="terminal-overlay" class="absolute bottom-4 left-4 font-mono text-[10px] text-cyan-500 space-y-1 pointer-events-none">
        <div class="animate-pulse">> Awaiting audio signal...</div>
      </div>
    </div>

    <div class="space-y-4 font-mono text-xs text-slate-400">
      <div class="p-4 bg-slate-950/50 rounded border border-slate-800/50">
        <label class="block mb-2 text-cyan-500 uppercase font-black">Input Source</label>
        <button id="micBtn" class="w-full py-2 bg-cyan-900/20 border border-cyan-500/40 text-cyan-400 hover:bg-cyan-500/20 transition-all uppercase mb-2">Initialize Mic</button>
        <input type="file" id="audioFile" accept="audio/*" class="hidden">
        <button onclick="document.getElementById('audioFile').click()" class="w-full py-2 bg-slate-800/40 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-all uppercase">Upload Local Track</button>
      </div>

      <div class="p-4 bg-slate-950/50 rounded border border-slate-800/50 space-y-4">
        <div>
          <div class="flex justify-between mb-1">
            <span>SENSITIVITY</span>
            <span id="sensVal" class="text-cyan-400">32</span>
          </div>
          <input type="range" id="sensitivity" min="32" max="256" step="32" value="32" class="w-full accent-cyan-500">
        </div>
        
        <div>
          <div class="flex justify-between mb-1">
            <span>SMOOTHING</span>
            <span id="smoothVal" class="text-cyan-400">0.8</span>
          </div>
          <input type="range" id="smoothing" min="0" max="0.99" step="0.01" value="0.8" class="w-full accent-cyan-500">
        </div>

        <div>
          <div class="flex justify-between mb-1">
            <span>HUE_SHIFT</span>
            <span id="hueVal" class="text-cyan-400">180</span>
          </div>
          <input type="range" id="hue" min="0" max="360" step="1" value="180" class="w-full accent-cyan-500">
        </div>
      </div>

      <button id="exportBtn" class="w-full py-3 bg-emerald-900/20 border border-emerald-500/40 text-emerald-400 hover:bg-emerald-500/20 transition-all font-black uppercase">Export Config JSON</button>
    </div>
  </div>

  <audio id="internalAudio"></audio>

  <style>
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(1000%); }
    }
    .animate-scanline { animation: scanline 8s linear infinite; }
    .hover-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .hover-scale:hover { transform: scale(1.01); }
    @keyframes electric-pulse {
      0%, 100% { box-shadow: 0 0 5px rgba(6, 182, 212, 0.2); border-color: rgba(6, 182, 212, 0.3); }
      50% { box-shadow: 0 0 15px rgba(6, 182, 212, 0.5); border-color: rgba(6, 182, 212, 0.8); }
    }
    .group-hover\:animate-electric-pulse:hover { animation: electric-pulse 1.5s infinite; }
  </style>

  <script>
    (function() {
      let audioCtx, analyser, source, animationId;
      const canvas = document.getElementById('visualizerCanvas');
      const ctx = canvas.getContext('2d');
      const terminal = document.getElementById('terminal-overlay');
      const controls = {
        sensitivity: document.getElementById('sensitivity'),
        smoothing: document.getElementById('smoothing'),
        hue: document.getElementById('hue')
      };

      const log = (msg, error = false) => {
        const div = document.createElement('div');
        div.className = error ? 'text-red-500' : 'text-cyan-500';
        div.textContent = `> ${msg}`;
        terminal.appendChild(div);
        if (terminal.childNodes.length > 5) terminal.removeChild(terminal.firstChild);
      };

      async function initAudio(streamSource) {
        if (audioCtx) audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        
        if (streamSource instanceof MediaStream) {
          source = audioCtx.createMediaStreamSource(streamSource);
        } else {
          source = audioCtx.createMediaElementSource(streamSource);
        }

        source.connect(analyser);
        if (!(streamSource instanceof MediaStream)) {
          analyser.connect(audioCtx.destination);
        }

        updateParams();
        log('Pipeline established.');
        render();
      }

      function updateParams() {
        if (!analyser) return;
        analyser.fftSize = parseInt(controls.sensitivity.value) * 2;
        analyser.smoothingTimeConstant = parseFloat(controls.smoothing.value);
        document.getElementById('sensVal').textContent = controls.sensitivity.value;
        document.getElementById('smoothVal').textContent = controls.smoothing.value;
        document.getElementById('hueVal').textContent = controls.hue.value;
      }

      function render() {
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        const draw = () => {
          animationId = requestAnimationFrame(draw);
          analyser.getByteFrequencyData(dataArray);

          canvas.width = canvas.clientWidth;
          canvas.height = canvas.clientHeight;

          ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const barWidth = (canvas.width / bufferLength) * 2.5;
          let x = 0;

          for (let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * canvas.height;
            const h = controls.hue.value;
            ctx.fillStyle = `hsla(${h}, 70%, 50%, ${dataArray[i] / 255})`;
            ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
            x += barWidth;
          }
        };
        draw();
      }

      // Listeners
      document.getElementById('micBtn').addEventListener('click', async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          log('Microphone access granted.');
          initAudio(stream);
        } catch (err) {
          log('ERROR: Mic access denied.', true);
        }
      });

      document.getElementById('audioFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const audio = document.getElementById('internalAudio');
          audio.src = URL.createObjectURL(file);
          log(`Loading: ${file.name.substring(0, 15)}...`);
          audio.play();
          initAudio(audio);
        }
      });

      document.getElementById('exportBtn').addEventListener('click', () => {
        const config = {
          fftSize: analyser?.fftSize || 'null',
          smoothing: controls.smoothing.value,
          hue: controls.hue.value,
          timestamp: new Date().toISOString()
        };
        console.log('EXPORT_CONFIG:', config);
        alert('Config dumped to console. Check the dev tools.');
      });

      Object.values(controls).forEach(c => c.addEventListener('input', updateParams));
    })();
  </script>
</div>
