<div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-fuchsia-500/20 p-6 hover-scale overflow-hidden group font-sans">
  <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-fuchsia-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>

  <a href="https://kzick001.github.io/dashboard/" class="absolute top-4 left-4 text-[10px] font-black text-fuchsia-800 hover:text-fuchsia-400 transition-colors tracking-tighter z-20">&larr; DASHBOARD</a>

  <header class="flex items-center gap-4 mb-6 mt-4 relative z-10">
    <div class="p-3 bg-fuchsia-950/60 border border-fuchsia-500/30 rounded-lg group-hover:animate-electric-pulse transition-all">
      <svg class="w-6 h-6 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
      </svg>
    </div>
    <h2 class="text-xl font-bold truncate text-slate-100 tracking-tight uppercase">Sonic_Forge_V2.0_Beta</h2>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 relative z-10">
    
    <div class="lg:col-span-3 relative aspect-video bg-slate-950 rounded-lg border border-slate-800/80 shadow-inner overflow-hidden flex flex-col justify-end">
      <canvas id="forgeCanvas" class="w-full h-full absolute inset-0"></canvas>
      
      <div id="terminal" class="absolute top-4 left-4 font-mono text-[11px] text-fuchsia-500/80 space-y-1 pointer-events-none z-10 bg-slate-950/50 p-2 rounded backdrop-blur-md border border-fuchsia-500/10 w-64 h-32 overflow-hidden flex flex-col justify-end">
        <div class="animate-pulse">> System standing by...</div>
      </div>
    </div>

    <div class="space-y-6 flex flex-col justify-between">
      
      <div class="space-y-4">
        <div class="p-4 bg-slate-950/40 rounded border border-slate-800/50 backdrop-blur-sm">
          <label class="block mb-3 text-[10px] text-fuchsia-500 font-mono tracking-widest uppercase font-black">Data Pipeline</label>
          <button id="hijackBtn" class="w-full py-3 bg-fuchsia-900/20 border border-fuchsia-500/50 text-fuchsia-400 hover:bg-fuchsia-500/20 hover:text-fuchsia-300 transition-all font-mono text-xs uppercase tracking-wider font-bold mb-2 group/btn relative overflow-hidden">
            <span class="relative z-10">Hijack System Audio</span>
            <div class="absolute inset-0 bg-fuchsia-500/10 translate-y-full group-hover/btn:translate-y-0 transition-transform"></div>
          </button>
          <p class="font-mono text-[9px] text-slate-500 leading-tight">Requires "Share System Audio" to be checked in the browser prompt.</p>
        </div>

        <div class="p-4 bg-slate-950/40 rounded border border-slate-800/50 backdrop-blur-sm space-y-5">
          <label class="block mb-1 text-[10px] text-fuchsia-500 font-mono tracking-widest uppercase font-black">Modulators</label>
          
          <div class="font-mono text-[10px]">
            <div class="flex justify-between mb-2">
              <span class="text-slate-400">RESOLUTION</span>
              <span id="resOut" class="text-fuchsia-400 font-bold">128</span>
            </div>
            <input type="range" id="resCtrl" min="32" max="256" step="32" value="128" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-fuchsia-500">
          </div>
          
          <div class="font-mono text-[10px]">
            <div class="flex justify-between mb-2">
              <span class="text-slate-400">DAMPENING</span>
              <span id="dampOut" class="text-fuchsia-400 font-bold">0.85</span>
            </div>
            <input type="range" id="dampCtrl" min="0.1" max="0.99" step="0.01" value="0.85" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-fuchsia-500">
          </div>
        </div>
      </div>

      <button id="dumpBtn" class="w-full py-3 bg-slate-900 border border-slate-700 hover:border-slate-500 text-slate-400 hover:text-slate-200 transition-all font-mono text-[10px] uppercase tracking-widest">
        Dump Variables
      </button>

    </div>
  </div>

  <style>
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(1000%); }
    }
    .animate-scanline { animation: scanline 8s linear infinite; }
    .hover-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .hover-scale:hover { transform: scale(1.01); }
    @keyframes electric-pulse {
      0%, 100% { box-shadow: 0 0 5px rgba(217, 70, 239, 0.2); border-color: rgba(217, 70, 239, 0.3); }
      50% { box-shadow: 0 0 15px rgba(217, 70, 239, 0.5); border-color: rgba(217, 70, 239, 0.8); }
    }
    .group-hover\:animate-electric-pulse:hover { animation: electric-pulse 1.5s infinite; }
  </style>

  <script>
    (() => {
      const state = {
        ctx: null,
        analyser: null,
        source: null,
        animFrame: null,
        isPlaying: false
      };

      const dom = {
        canvas: document.getElementById('forgeCanvas'),
        ctx2d: document.getElementById('forgeCanvas').getContext('2d'),
        term: document.getElementById('terminal'),
        btnHijack: document.getElementById('hijackBtn'),
        btnDump: document.getElementById('dumpBtn'),
        ctrls: {
          res: document.getElementById('resCtrl'),
          damp: document.getElementById('dampCtrl')
        },
        outs: {
          res: document.getElementById('resOut'),
          damp: document.getElementById('dampOut')
        }
      };

      const sysLog = (msg, isError = false, isPulse = false) => {
        const line = document.createElement('div');
        line.className = `${isError ? 'text-red-500 font-bold' : 'text-fuchsia-400'} ${isPulse ? 'animate-pulse' : ''} whitespace-nowrap`;
        
        const timestamp = new Date().toISOString().split('T')[1].substring(0, 8);
        line.textContent = `[${timestamp}] ${msg}`;
        
        dom.term.appendChild(line);
        while (dom.term.children.length > 6) {
          dom.term.removeChild(dom.term.firstChild);
        }
      };

      const syncParams = () => {
        if (!state.analyser) return;
        state.analyser.fftSize = parseInt(dom.ctrls.res.value) * 2;
        state.analyser.smoothingTimeConstant = parseFloat(dom.ctrls.damp.value);
        dom.outs.res.textContent = dom.ctrls.res.value;
        dom.outs.damp.textContent = dom.ctrls.damp.value;
      };

      const bootVisualizer = () => {
        const bufferLength = state.analyser.frequencyBinCount;
        const data = new Uint8Array(bufferLength);
        
        const paint = () => {
          state.animFrame = requestAnimationFrame(paint);
          state.analyser.getByteFrequencyData(data);

          const w = dom.canvas.clientWidth;
          const h = dom.canvas.clientHeight;
          dom.canvas.width = w;
          dom.canvas.height = h;

          // Clear frame
          dom.ctx2d.clearRect(0, 0, w, h);

          // Mirrored Center-Out Render Logic
          const barWidth = (w / bufferLength) * 0.8;
          const center = w / 2;

          for (let i = 0; i < bufferLength; i++) {
            const intensity = data[i] / 255;
            const barHeight = intensity * (h * 0.8);
            
            // Generate a fuchsia/purple gradient based on intensity
            const r = 217; 
            const g = 70 + (intensity * 50);
            const b = 239;
            dom.ctx2d.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.4 + (intensity * 0.6)})`;

            // Draw Right Side
            dom.ctx2d.fillRect(center + (i * barWidth), h - barHeight, barWidth - 1, barHeight);
            
            // Draw Left Side (Mirrored)
            if (i > 0) {
              dom.ctx2d.fillRect(center - (i * barWidth), h - barHeight, barWidth - 1, barHeight);
            }
          }
        };
        
        if (state.animFrame) cancelAnimationFrame(state.animFrame);
        paint();
      };

      // Event: Screen/Audio Hijack
      dom.btnHijack.addEventListener('click', async () => {
        try {
          sysLog('> Requesting display media stream...', false, true);
          
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true, // Required to prompt, we kill it next.
            audio: true
          });

          // The trick: Sever the video track immediately
          stream.getVideoTracks().forEach(track => {
            track.stop();
            stream.removeTrack(track);
          });
          sysLog('> Video track terminated.');

          const audioTracks = stream.getAudioTracks();
          if (audioTracks.length === 0) {
            throw new Error("No audio payload detected.");
          }

          sysLog('> Audio stream secured. Initializing pipeline...');

          if (!state.ctx) {
            state.ctx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (state.ctx.state === 'suspended') {
            await state.ctx.resume();
          }

          state.analyser = state.ctx.createAnalyser();
          state.source = state.ctx.createMediaStreamSource(new MediaStream(audioTracks));
          state.source.connect(state.analyser);
          // Do not connect to destination to avoid infinite feedback loop

          syncParams();
          bootVisualizer();
          
          dom.btnHijack.textContent = 'PIPELINE ACTIVE';
          dom.btnHijack.classList.replace('text-fuchsia-400', 'text-slate-100');
          dom.btnHijack.classList.add('animate-pulse');

        } catch (err) {
          sysLog(`> FATAL: ${err.message}`, true);
        }
      });

      // Event: Listeners
      Object.values(dom.ctrls).forEach(el => el.addEventListener('input', syncParams));

      dom.btnDump.addEventListener('click', () => {
        const payload = {
          fftSize: state.analyser ? state.analyser.fftSize : null,
          dampening: dom.ctrls.damp.value,
          resolution: dom.ctrls.res.value,
          status: state.source ? 'ACTIVE' : 'OFFLINE'
        };
        console.table(payload);
        sysLog('> Variables dumped to console dev tools.');
      });

      // Init
      sysLog('> Awaiting commands...');
    })();
  </script>
</div>
