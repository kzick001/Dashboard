            <h1 class="text-3xl font-bold sterling-green tracking-tight">Sterling Sports Network</h1>

        <main class="w-full max-w-2xl flex flex-col gap-6">
            
            <!-- Pro Sports -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow w-full overflow-hidden transition-all duration-200 hover:shadow-md">
                <div class="p-3 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 flex justify-between items-center cursor-pointer select-none" onclick="toggleFeed('pro')">

                                <svg id="refresh-ncaa" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>

                    <div id="ncaa-feed" class="block transition-all duration-300 origin-top bg-white dark:bg-gray-800">
                        <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-gray-100 dark:divide-gray-700">

                                <div id="ncaa-mens-feed" class="max-h-[350px] overflow-y-auto divide-y divide-gray-100 dark:divide-gray-700">
                                    <div class="p-4 text-center text-sm text-gray-400">Loading bracket...</div>

                            <div>

        </main>

        <footer class="mt-12 text-gray-400 text-xs text-center">
            &copy; <span id="year"></span> Sterling Specialty Pharmacy. All rights reserved.
        </footer>
    </div>

    <script>
        // --- Core UI Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        const htmlClass = document.documentElement.classList;

        if (htmlClass.contains('dark')) themeToggle.checked = true;

        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                htmlClass.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlClass.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        document.getElementById('year').textContent = new Date().getFullYear();

        function toggleFeed(prefix) {
            const feed = document.getElementById(`${prefix}-feed`);
            const chevron = document.getElementById(`${prefix}-feed-chevron`);
            feed.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }

        // --- Configuration Arrays ---
        const proConfig = [
            { id: 'min-nfl', name: 'Minnesota Vikings', teamId: '15', league: 'nfl', icon: '🏈', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/15/schedule' },
            { id: 'gb-nfl', name: 'Green Bay Packers', teamId: '9', league: 'nfl', icon: '🏈', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/9/schedule' },
            { id: 'min-nba', name: 'Minnesota Timberwolves', teamId: '16', league: 'nba', icon: '🏀', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/16/schedule' },
            { id: 'min-wnba', name: 'Minnesota Lynx', teamId: '14', league: 'wnba', icon: '🏀', gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/teams/14/schedule' },
            { id: 'mil-nba', name: 'Milwaukee Bucks', teamId: '15', league: 'nba', icon: '🏀', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/15/schedule' },
            { id: 'min-mlb', name: 'Minnesota Twins', teamId: '10', league: 'mlb', icon: '⚾', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/10/schedule' },
            { id: 'mil-mlb', name: 'Milwaukee Brewers', teamId: '8', league: 'mlb', icon: '⚾', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/8/schedule' },
            { id: 'min-nhl', name: 'Minnesota Wild', teamId: '30', league: 'nhl', icon: '🏒', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/teams/30/schedule' },
            { id: 'min-pwhl', name: 'Minnesota Frost', teamId: '4', league: 'pwhl', icon: '🏒', gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/pwhl/teams/4/schedule' }
        ];

        const collegeConfig = [
            { name: 'Wisconsin Football', teamId: '275', icon: '🏈', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/college-football/teams/275/schedule' },
            { name: 'Minnesota Football', teamId: '135', icon: '🏈', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/football/college-football/teams/135/schedule' },
            { name: 'Wisconsin Basketball', teamId: '275', icon: '🏀', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/teams/275/schedule' },
            { name: 'Minnesota Basketball', teamId: '135', icon: '🏀', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/teams/135/schedule' },
            { name: 'Wisconsin Basketball', teamId: '275', icon: '🏀', gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/womens-college-basketball/teams/275/schedule' },
            { name: 'Minnesota Basketball', teamId: '135', icon: '🏀', gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/womens-college-basketball/teams/135/schedule' },
            { name: 'Wisconsin Hockey', teamId: '275', icon: '🏒', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/mens-college-hockey/teams/275/schedule' },
            { name: 'Minnesota Hockey', teamId: '135', icon: '🏒', gender: 'M', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/mens-college-hockey/teams/135/schedule' },
            { name: 'Wisconsin Hockey', teamId: '275', icon: '🏒', gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/womens-college-hockey/teams/275/schedule' },
            { name: 'Minnesota Hockey', teamId: '135', icon: '🏒', gender: 'W', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/womens-college-hockey/teams/135/schedule' }
        ];

        // --- Data Fetching & Rendering Engines ---
        let standingsCache = {};

        async function fetchAllStandings() {
            const leagues = [
                { id: 'nfl', sport: 'football' }, { id: 'nba', sport: 'basketball' },
                { id: 'wnba', sport: 'basketball' }, { id: 'mlb', sport: 'baseball' }, 
                { id: 'nhl', sport: 'hockey' }, { id: 'mens-college-basketball', sport: 'basketball' },
                { id: 'womens-college-basketball', sport: 'basketball' }
            ];
            for (const lg of leagues) {
                try {
                    const resp = await fetch(`https://site.api.espn.com/apis/v2/sports/${lg.sport}/${lg.id}/standings`);
                    standingsCache[lg.id] = await resp.json();
                } catch (e) {}
            }
        }

        function getRecord(teamData, leagueId) {
            let record = teamData?.records?.[0]?.summary || teamData?.team?.record?.items?.[0]?.summary || teamData?.team?.record?.summary;
            if (record) return record;
            
            const data = standingsCache[leagueId];
            if (!data || !teamData?.team?.id) return '';
            
            function search(obj) {
                if (record) return; 
                if (!obj || typeof obj !== 'object') return;
                if (obj.team && String(obj.team.id) === String(teamData.team.id)) {
                    const stats = obj.stats || [];
                    const overall = stats.find(s => s.name === 'overall') || stats.find(s => s.type === 'overall') || stats[0];
                    if (overall) record = overall.displayValue || overall.summary || '';
                    return;
                }
                if (Array.isArray(obj)) { for (let item of obj) search(item); } 
                else { for (let key in obj) search(obj[key]); }
            }
            search(data);
            return record;
        }

        function buildTitle(config, event) {
            let name = config.name;
            if (config.league === 'nfl' && event?.season?.type === 1) name += ' <span class="text-orange-500 ml-1">(PRE)</span>';
            
            let genderTag = '';
            if (config.gender === 'W') genderTag = '<span class="bg-purple-100 text-purple-700 dark:bg-purple-900/50 dark:text-purple-300 px-1 py-0.5 rounded text-[8px] ml-1 font-bold">WOMEN</span>';
            if (config.gender === 'M') genderTag = '<span class="bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 px-1 py-0.5 rounded text-[8px] ml-1 font-bold">MEN</span>';
            
            return `${config.icon} ${name} ${genderTag}`;
        }

        function renderStatusCard(config, status, statusClass) {
            return `
                <div class="p-4 flex items-center justify-between bg-gray-50/50 dark:bg-gray-800/50">
                    <span class="text-sm font-bold text-gray-500 dark:text-gray-400 flex items-center">${buildTitle(config, null)}</span>
                    <span class="text-[10px] font-bold px-2 py-1 rounded tracking-widest ${statusClass}">${status}</span>
                </div>
            `;
        }

        function processTeamData(config, data) {
            if (!data?.events || data.events.length === 0) return { html: renderStatusCard(config, 'UNAVAILABLE', 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'), weight: 6 };

            const isPreseason = data.events.some(e => e.season?.type === 1);
            if (config.league === 'mlb' && isPreseason) {
                return { html: renderStatusCard(config, 'SPRING TRAINING', 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-500'), weight: 5 };
            }

            const teamEvents = data.events.filter(e => {
                const comps = e?.competitions?.[0]?.competitors || [];
                return comps.some(c => String(c?.team?.id) === String(config.teamId));
            });
            
            if (teamEvents.length === 0) return { html: renderStatusCard(config, 'OFFSEASON', 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'), weight: 5 };

            const now = new Date();
            let event = teamEvents.find(e => e.status?.type?.state === 'in');
            
            if (!event) {
                event = teamEvents.reduce((closest, current) => {
                    const cDate = new Date(current.competitions?.[0]?.date || 0);
                    const clDate = new Date(closest.competitions?.[0]?.date || 0);
                    return Math.abs(cDate - now) < Math.abs(clDate - now) ? current : closest;
                });
            }

            const comp = event?.competitions?.[0];
            if (!comp) return { html: renderStatusCard(config, 'OFFSEASON', 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'), weight: 5 };

            const gameDate = new Date(comp.date);
            const daysDiff = (gameDate - now) / (1000 * 60 * 60 * 24);
            
            if (Math.abs(daysDiff) > 21) return { html: renderStatusCard(config, 'OFFSEASON', 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'), weight: 5 };

            const comps = comp.competitors || [];
            const home = comps.find(c => c?.homeAway === 'home') || comps[0];
            const away = comps.find(c => c?.homeAway === 'away') || comps[1];

            const state = comp.status?.type?.state || 'pre';
            const isLive = state === 'in';
            const weight = isLive ? 1 : (daysDiff > 0 ? 2 : 3); 

            const venue = comp.notes?.[0]?.headline || comp.venue?.fullName || 'TBD Venue';
            const displayDate = gameDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            
            const parseScore = (team) => {
                if (state === 'pre' || team?.score == null) return '-';
                return typeof team.score === 'object' ? (team.score.displayValue ?? team.score.value ?? '-') : team.score;
            };
            
            const statusClass = isLive 
                ? 'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 animate-pulse' 
                : 'bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-300';
            
            const renderRow = (t) => `
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        ${t?.team?.logos?.[0]?.href ? `<img src="${t.team.logos[0].href}" class="w-6 h-6 object-contain" onerror="this.style.opacity='0'">` : '<div class="w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-700"></div>'}
                        <div class="flex flex-col">
                            <span class="text-sm ${t?.winner ? 'font-bold text-gray-900 dark:text-white' : 'text-gray-700 dark:text-gray-200'}">${t?.team?.shortDisplayName || t?.team?.displayName || 'TBA'}</span>
                            <span class="text-[10px] text-gray-400">${getRecord(t, config.league)}</span>
                        </div>
                    </div>
                    <span class="text-lg font-mono ${t?.winner ? 'text-sterling-green font-bold' : 'text-gray-600 dark:text-gray-400'}">${parseScore(t)}</span>
                </div>
            `;

            const html = `
                <div class="p-4 bg-white dark:bg-gray-800">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block mb-1 flex items-center">${buildTitle(config, event)}</span>
                            <div class="text-[11px] text-gray-500 flex items-center gap-2">
                                <span>${displayDate}</span><span>&bull;</span><span class="truncate max-w-[150px]">${venue}</span>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${statusClass}">${comp.status?.type?.shortDetail || 'TBD'}</span>
                    </div>
                    <div class="flex flex-col gap-2">${renderRow(away)}${renderRow(home)}</div>
                </div>
            `;
            return { html, weight };
        }

        async function fetchFeedGroup(configArray, containerId, iconId, isSilent) {
            const container = document.getElementById(containerId);
            const icon = document.getElementById(iconId);
            if (!isSilent && icon) icon.classList.add('animate-spin');

            try {
                const results = await Promise.all(configArray.map(async (config) => {
                    try {
                        const resp = await fetch(config.url);
                        return processTeamData(config, await resp.json());
                    } catch (e) {
                        return { html: renderStatusCard(config, 'UNAVAILABLE', 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'), weight: 6 };
                    }
                }));
                const valid = results.filter(r => r !== null).sort((a, b) => a.weight - b.weight);
                container.innerHTML = valid.map(r => r.html).join('') || '<div class="p-8 text-center text-sm text-gray-400">No data available.</div>';
            } catch (e) {
                if (!isSilent) container.innerHTML = '<div class="p-8 text-center text-sm text-red-400">Feed error.</div>';
            } finally {
                if (!isSilent && icon) setTimeout(() => icon.classList.remove('animate-spin'), 500);
            }
        }

        async function fetchNCAATournament(gender, containerId) {
            const container = document.getElementById(containerId);
            try {
                const now = new Date();
                const d = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/${gender}-college-basketball/scoreboard?dates=${d}`;
                
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (!data?.events || data.events.length === 0) {
                    container.innerHTML = '<div class="p-6 text-center text-sm text-gray-500 italic">No games today.</div>';
                    return;
                }
                
                let targetGames = data.events.sort((a, b) => {
                    const sA = a.status?.type?.state; const sB = b.status?.type?.state;
                    if (sA === 'in' && sB !== 'in') return -1;
                    if (sA !== 'in' && sB === 'in') return 1;
                    return new Date(a.date) - new Date(b.date);
                });

                container.innerHTML = targetGames.map(event => {
                    const comp = event.competitions?.[0];
                    if (!comp) return '';
                    const home = comp.competitors?.find(c => c.homeAway === 'home');
                    const away = comp.competitors?.find(c => c.homeAway === 'away');
                    if (!home || !away) return '';

                    const state = comp.status?.type?.state;
                    const isLive = state === 'in';
                    const isPre = state === 'pre';
                    
                    const time = new Date(comp.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const statusClass = isLive ? 'text-red-600 dark:text-red-400 animate-pulse' : 'text-gray-500 dark:text-gray-400';

                    const renderTeam = (t) => `
                        <div class="flex items-center gap-2">
                            ${t.curatedRank?.current < 26 ? `<span class="text-[10px] text-gray-400 font-mono">${t.curatedRank.current}</span>` : ''}
                            <span class="text-sm ${t.winner ? 'font-bold text-gray-900 dark:text-white' : 'text-gray-700 dark:text-gray-200'}">${t.team?.shortDisplayName || 'TBA'}</span>
                        </div>
                        <span class="text-sm font-mono ${t.winner ? 'font-bold text-sterling-green' : 'text-gray-600 dark:text-gray-400'}">${isPre ? '-' : (t.score || '-')}</span>
                    `;

                    return `
                        <div class="p-3 bg-white dark:bg-gray-800">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-bold text-gray-400 tracking-wider truncate max-w-[150px]">${event.shortName}</span>
                                <span class="text-[10px] font-bold ${statusClass}">${isPre ? time : comp.status?.type?.shortDetail}</span>
                            </div>
                            <div class="flex flex-col gap-1 w-full">
                                <div class="flex justify-between">${renderTeam(away)}</div>
                                <div class="flex justify-between">${renderTeam(home)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div class="p-4 text-center text-sm text-red-400">Unavailable.</div>';
            }
        }

        async function refreshNCAA(isSilent) {
            const icon = document.getElementById('refresh-ncaa');
            if (!isSilent && icon) icon.classList.add('animate-spin');
            
            if (checkNCAAWindow()) {
                await Promise.all([
                    fetchNCAATournament('mens', 'ncaa-mens-feed'),
                    fetchNCAATournament('womens', 'ncaa-womens-feed')
                ]);
            }
            
            if (!isSilent && icon) setTimeout(() => icon.classList.remove('animate-spin'), 500);
        }

        function checkNCAAWindow() {
            const container = document.getElementById('ncaa-container');
            const title = document.getElementById('ncaa-title');
            
            const now = new Date();
            const year = now.getFullYear();
            
            const activeStart = new Date(year, 2, 10);
            const activeEnd = new Date(year, 3, 15);
            
            if (now < activeStart || now > activeEnd) {
                container.classList.add('opacity-40', 'grayscale', 'pointer-events-none');
                if (!title.innerHTML.includes('Off-season')) {
                    title.innerHTML += ' <span class="text-xs font-normal text-gray-500 ml-2">(Off-season)</span>';
                }
                return false;
            }
            return true;
        }

        // --- Initialization ---
        async function initializeDashboard() {
            await fetchAllStandings();
            fetchFeedGroup(proConfig, 'pro-feed', 'refresh-pro', false);
            fetchFeedGroup(collegeConfig, 'college-feed', 'refresh-college', false);
            refreshNCAA(false);
        }

        document.addEventListener("DOMContentLoaded", initializeDashboard);
        
        setInterval(() => {
            fetchFeedGroup(proConfig, 'pro-feed', null, true);
            fetchFeedGroup(collegeConfig, 'college-feed', null, true);
            refreshNCAA(true);
        }, 15000);
        
        setInterval(fetchAllStandings, 3600000);
    </script>
</body>
</html>
