<script>
        // --- Core Dashboard Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        const htmlClass = document.documentElement.classList;

        if (htmlClass.contains('dark')) themeToggle.checked = true;

        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                htmlClass.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlClass.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        document.getElementById('year').textContent = new Date().getFullYear();

        // --- Hardcoded Tracker Configuration ---
        const trackingConfig = [
            { id: 'nfl-min', name: 'Minnesota Vikings', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/15/schedule' },
            { id: 'nfl-gb', name: 'Green Bay Packers', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/9/schedule' },
            { id: 'mlb-min', name: 'Minnesota Twins', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/10/schedule' },
            { id: 'mlb-mil', name: 'Milwaukee Brewers', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/8/schedule' },
            { id: 'nhl-min', name: 'Minnesota Wild', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/teams/30/schedule' },
            { id: 'ncaa-m', name: 'NCAA Men\'s Tournament', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard', isScoreboard: true },
            { id: 'ncaa-w', name: 'NCAA Women\'s Tournament', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/womens-college-basketball/scoreboard', isScoreboard: true }
        ];

        // --- Data Fetching & Rendering ---
        async function fetchAllData() {
            const feed = document.getElementById('sports-feed');
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('animate-spin');

            try {
                const results = await Promise.all(
                    trackingConfig.map(async (config) => {
                        try {
                            const resp = await fetch(config.url);
                            const data = await resp.json();
                            return processSportData(config, data);
                        } catch (e) {
                            console.error(`Failed to fetch ${config.name}`, e);
                            return null;
                        }
                    })
                );

                // Filter out nulls, sort by calculated weight (Live -> Active -> Offseason), and inject
                const validResults = results.filter(r => r !== null);
                validResults.sort((a, b) => a.weight - b.weight);
                
                feed.innerHTML = validResults.map(r => r.html).join('') || '<div class="p-8 text-center text-sm text-gray-400">No data available at this time.</div>';
            } catch (error) {
                feed.innerHTML = '<div class="p-8 text-center text-sm text-red-400">System error loading feed.</div>';
            } finally {
                setTimeout(() => refreshIcon.classList.remove('animate-spin'), 500);
            }
        }

        function processSportData(config, data) {
            let event = null;

            if (config.isScoreboard) {
                if (!data.events || data.events.length === 0) return createEmptyCard(config.name, 4);
                event = data.events.find(e => e.status.type.state === 'in') || data.events[0];
            } else {
                if (!data.events || data.events.length === 0) return createEmptyCard(config.name, 4);
                
                for (let i = data.events.length - 1; i >= 0; i--) {
                    const state = data.events[i].competitions[0].status.type.state;
                    if (state === 'in' || state === 'post') {
                        event = data.events[i];
                        break;
                    }
                }
                if (!event) event = data.events[0];
            }

            if (!event || !event.competitions || !event.competitions[0]) return null;

            const comp = event.competitions[0];
            const home = comp.competitors.find(c => c.homeAway === 'home');
            const away = comp.competitors.find(c => c.homeAway === 'away');
            const state = comp.status.type.state;
            const isLive = state === 'in';
            const isPre = state === 'pre';

            // --- Date & Relevance Math ---
            const gameDate = new Date(comp.date);
            const now = new Date();
            const daysDiff = (gameDate - now) / (1000 * 60 * 60 * 24);
            const absDays = Math.abs(daysDiff);
            const isOffseason = absDays > 21; // More than 3 weeks away or past

            // Assign sorting weight
            let weight = 4; // Default to bottom
            if (isLive) weight = 1; // Top priority
            else if (!isOffseason && daysDiff > 0) weight = 2; // Active Upcoming
            else if (!isOffseason && daysDiff <= 0) weight = 3; // Active Past
            if (isOffseason) weight = 5; // Absolute bottom

            // Format UI details
            const venue = comp.venue ? comp.venue.fullName : 'TBD Venue';
            const displayDate = gameDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            
            // Fix the Object bug & handle pre-game scores
            const parseScore = (teamData) => {
                if (isPre || !teamData.score || typeof teamData.score === 'object') return '-';
                return teamData.score;
            };
            const awayScore = parseScore(away);
            const homeScore = parseScore(home);

            // Conditional styling based on relevance
            const statusDetail = isOffseason ? 'OFFSEASON' : comp.status.type.shortDetail;
            const statusClass = isLive 
                ? 'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 animate-pulse' 
                : (isOffseason ? 'bg-gray-100 text-gray-400 dark:bg-gray-800 dark:text-gray-600' : 'bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-300');
            
            const rowClass = isOffseason ? 'p-4 opacity-60 grayscale hover:grayscale-0 transition-all' : 'p-4 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors';

            const homeRecord = home.records && home.records[0] ? home.records[0].summary : '';
            const awayRecord = away.records && away.records[0] ? away.records[0].summary : '';

            const html = `
                <div class="${rowClass}">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 block mb-1">
                                ${config.name}
                            </span>
                            <div class="text-[11px] text-gray-500 dark:text-gray-400 flex items-center gap-2">
                                <span>${displayDate}</span>
                                <span>&bull;</span>
                                <span class="truncate max-w-[150px]">${venue}</span>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${statusClass}">
                            ${statusDetail}
                        </span>
                    </div>

                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <img src="${away.team.logos ? away.team.logos[0].href : ''}" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
                                <div class="flex flex-col">
                                    <span class="text-sm ${away.winner ? 'font-bold' : ''}">${away.team.displayName}</span>
                                    <span class="text-[10px] text-gray-400">${awayRecord}</span>
                                </div>
                            </div>
                            <span class="text-lg font-mono ${away.winner ? 'text-sterling-green font-bold' : ''}">${awayScore}</span>
                        </div>

                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <img src="${home.team.logos ? home.team.logos[0].href : ''}" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
                                <div class="flex flex-col">
                                    <span class="text-sm ${home.winner ? 'font-bold' : ''}">${home.team.displayName}</span>
                                    <span class="text-[10px] text-gray-400">${homeRecord}</span>
                                </div>
                            </div>
                            <span class="text-lg font-mono ${home.winner ? 'text-sterling-green font-bold' : ''}">${homeScore}</span>
                        </div>
                    </div>
                </div>
            `;
            
            return { html, weight };
        }

        function createEmptyCard(title, weight) {
            return {
                html: `
                    <div class="p-4 opacity-50 grayscale">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 block mb-2">${title}</span>
                        <p class="text-sm text-gray-500 dark:text-gray-400 italic">Offseason / No active schedule.</p>
                    </div>
                `,
                weight: weight
            };
        }

        // Init
        fetchAllData();
        setInterval(fetchAllData, 60000);
    </script>
