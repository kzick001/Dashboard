<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #020617; overflow: hidden; margin: 0; padding: 0; }
        .ghost-fade { transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .panel-slide { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #334155; border-radius: 1px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #94a3b8; margin-top: -5px; cursor: pointer; transition: background 0.2s; }
        input[type=range]:hover::-webkit-slider-thumb { background: #cbd5e1; }
        
        .cyber-toggle:checked { right: 0; border-color: #94a3b8; }
        .cyber-toggle:checked + .toggle-label { background-color: #475569; }
    </style>
</head>
<body class="w-screen h-screen text-slate-100 font-sans select-none">

    <canvas id="coreCanvas" class="fixed inset-0 w-full h-full z-0"></canvas>

    <div class="fixed bottom-6 right-8 text-right z-10 drop-shadow-lg pointer-events-none">
        <div id="hudTime" class="text-4xl font-light text-slate-200 tracking-widest">--:--</div>
        <div class="flex items-center justify-end gap-2 mt-1 text-slate-400 font-mono text-xs uppercase tracking-wider">
            <span id="hudWeatherTemp">SYNCING...</span>
        </div>
    </div>

    <div id="ghostLayer" class="fixed inset-0 z-20 pointer-events-none ghost-fade">
        <button id="menuToggle" class="absolute top-6 left-6 w-12 h-12 rounded-full bg-slate-900/50 backdrop-blur-md border border-slate-700/50 flex items-center justify-center text-slate-400 hover:text-slate-100 hover:bg-slate-800/80 transition-all pointer-events-auto shadow-lg hover:shadow-cyan-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
            </svg>
        </button>

        <div id="commandDeck" class="absolute top-24 left-6 w-80 bg-slate-950/80 backdrop-blur-xl border border-slate-800/60 rounded-xl p-6 pointer-events-auto panel-slide -translate-x-[120%] shadow-2xl">
            <div class="mb-6 pb-4 border-b border-slate-800">
                <h2 class="text-lg font-semibold tracking-wide text-slate-200">Flow Parameters</h2>
                <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest mt-1">Zen Engine v2.0</p>
            </div>

            <div class="space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-mono text-slate-500 mb-1.5 uppercase">Visual Matrix</label>
                        <select id="themeSelect" class="w-full bg-slate-900/50 border border-slate-700 rounded p-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-slate-500 transition-colors">
                            <option value="saturn">Saturn Multiplexer</option>
                            <option value="mesh">Cymatic Topography (3D)</option>
                            <option value="galaxy">Void Galaxy</option>
                            <option value="zen">Zen Garden</option>
                            <option value="neural">Neural Synapse</option>
                            <option value="orbs">Bioluminescent Orbs</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-mono text-slate-500 mb-1.5 uppercase">Color Palette</label>
                        <select id="paletteSelect" class="w-full bg-slate-900/50 border border-slate-700 rounded p-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-slate-500 transition-colors">
                            <option value="nordic">Nordic Drift (Slate/Blue)</option>
                            <option value="matcha">Matcha (Sage/Forest)</option>
                            <option value="grayscale">Grayscale (Monochrome)</option>
                            <option value="neon">Neon Tokyo (Pink/Cyan)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Audio Sensitivity <span id="sensVal" class="text-slate-300">1.0x</span>
                        </label>
                        <input type="range" id="sensitivitySlider" min="0.1" max="3" step="0.1" value="1.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Velocity <span id="velVal" class="text-slate-300">1.0x</span>
                        </label>
                        <input type="range" id="velocitySlider" min="0.1" max="2" step="0.1" value="1.0">
                    </div>
                    <div>
                        <label class="flex justify-between text-[10px] font-mono text-slate-500 mb-1.5 uppercase">
                            Density <span id="denVal" class="text-slate-300">80</span>
                        </label>
                        <input type="range" id="densitySlider" min="20" max="200" step="10" value="80">
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-800 space-y-3">
                    <div class="flex justify-between items-center group">
                        <span class="text-xs font-mono text-slate-400 flex items-center gap-2">
                            <svg class="w-3 h-3 text-slate-500 group-hover:text-slate-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                            SYSTEM AUDIO
                        </span>
                        <div class="relative inline-block w-8 align-middle">
                            <input type="checkbox" id="toggleAudio" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-300 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                            <label for="toggleAudio" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-mono text-slate-400">GHOST TRAILS</span>
                        <div class="relative inline-block w-8 align-middle">
                            <input type="checkbox" id="togglePersistence" checked class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-300 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                            <label for="togglePersistence" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-mono text-slate-400">DEEP BREATH</span>
                        <div class="relative inline-block w-8 align-middle">
                            <input type="checkbox" id="toggleBreath" class="cyber-toggle absolute block w-4 h-4 rounded-full bg-slate-300 border-2 border-slate-600 appearance-none cursor-pointer transition-all z-10 top-0 bottom-0 m-auto"/>
                            <label for="toggleBreath" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-800 cursor-pointer transition-colors"></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --- Architecture Setup ---
            const canvas = document.getElementById('coreCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, timeTick = 0;

            const palettes = {
                nordic: ['#94a3b8', '#64748b', '#38bdf8', '#818cf8', '#0f172a'],
                matcha: ['#d9f99d', '#a3e635', '#4d7c0f', '#ecfccb', '#052e16'],
                grayscale: ['#333333', '#666666', '#999999', '#cccccc', '#111111'],
                neon: ['#f43f5e', '#8b5cf6', '#06b6d4', '#fcd34d', '#2e1065']
            };

            const state = {
                theme: 'saturn',
                colors: palettes.nordic,
                velocity: 1.0,
                density: 80,
                audio: false,
                sensitivity: 1.0,
                persistence: true,
                breath: false,
                mouseX: -1000, mouseY: -1000,
                audioData: new Uint8Array(256).fill(0)
            };

            // Audio Core
            let audioCtx, analyser, mediaStream;
            function getAudioBand(startBin, endBin) {
                if (!state.audio || !state.audioData) return 0;
                let sum = 0;
                for(let i=startBin; i<endBin; i++) sum += state.audioData[i];
                return (sum / (endBin - startBin)) / 255; // Normalized 0-1
            }

            // --- ENGINE REGISTRY CLASSES ---

            // 1. Saturn Multiplexer Engine
            class SaturnEngine {
                constructor() {}
                init() {
                    this.stars = [];
                    for(let i=0; i<150; i++) this.stars.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*1.5});
                }
                update() {
                    this.stars.forEach(s => {
                        s.x -= 0.1 * state.velocity;
                        if(s.x < 0) s.x = width;
                    });
                }
                draw() {
                    ctx.fillStyle = state.colors[1];
                    this.stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); });

                    const cx = width / 2, cy = height / 2;
                    const rPlanet = Math.min(width, height) * 0.15;
                    const ringTilt = 0.35;

                    // Audio Bands: Sub, Low-Mid, High-Mid, High
                    const bands = [
                        { s: 0, e: 6, rBase: rPlanet * 1.3, color: state.colors[0], w: 4 },
                        { s: 6, e: 20, rBase: rPlanet * 1.6, color: state.colors[1], w: 3 },
                        { s: 20, e: 60, rBase: rPlanet * 1.9, color: state.colors[2], w: 2 },
                        { s: 60, e: 120, rBase: rPlanet * 2.2, color: state.colors[3], w: 1.5 }
                    ];

                    const drawRings = (startAngle, endAngle, isFront) => {
                        bands.forEach((band, idx) => {
                            ctx.beginPath();
                            ctx.strokeStyle = band.color;
                            ctx.lineWidth = band.w;
                            ctx.globalAlpha = isFront ? 0.9 : 0.3;
                            
                            let first = true;
                            for(let i = startAngle; i <= endAngle + 0.05; i += 0.05) {
                                let angle = Math.min(i, endAngle);
                                // Isolate local frequency for ripple effect + global band average for baseline expansion
                                let localBin = Math.floor((Math.abs(angle - Math.PI) / Math.PI) * (band.e - band.s)) + band.s;
                                let localMod = state.audio ? (state.audioData[localBin] / 255) : 0;
                                let globalMod = getAudioBand(band.s, band.e);
                                
                                let r = band.rBase + ((globalMod * 40) + (localMod * 30)) * state.sensitivity;
                                let x = cx + Math.cos(angle) * r;
                                let y = cy + Math.sin(angle) * r * ringTilt;
                                
                                if (first) { ctx.moveTo(x, y); first = false; }
                                else ctx.lineTo(x, y);
                            }
                            ctx.stroke();
                        });
                    };

                    // Back Rings
                    drawRings(Math.PI, Math.PI * 2, false);

                    // Planet
                    ctx.globalAlpha = 1;
                    let grad = ctx.createLinearGradient(cx - rPlanet, cy - rPlanet, cx + rPlanet, cy + rPlanet);
                    grad.addColorStop(0, state.colors[4]);
                    grad.addColorStop(1, '#000000');
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.arc(cx, cy, rPlanet, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = state.colors[1]; ctx.lineWidth = 1; ctx.stroke();

                    // Front Rings
                    drawRings(0, Math.PI, true);
                }
            }

            // 2. Cymatic Mesh (3D Topography) Engine
            class MeshEngine {
                constructor() {}
                init() {}
                update() {}
                draw() {
                    const lines = 35;
                    const fov = 350;
                    ctx.lineWidth = 1.5;
                    
                    // The camera moves forward by shifting the Z phase based on time
                    let zOffset = (timeTick * 0.05 * state.velocity) % 1;

                    for(let z = 1; z < lines; z++) {
                        let actualZ = z - zOffset;
                        if (actualZ <= 0) continue; // Don't draw behind camera

                        ctx.beginPath();
                        ctx.strokeStyle = state.colors[(z % 3) + 1];
                        ctx.globalAlpha = Math.max(0, 1 - (actualZ / lines)); // Fade in distance
                        
                        let first = true;
                        for(let x = -width*0.8; x <= width*0.8; x += 30) {
                            let audioMod = 0;
                            if(state.audio) {
                                let bin = Math.floor((Math.abs(x) / (width*0.8)) * 80);
                                audioMod = (state.audioData[bin] || 0) * state.sensitivity * 0.8;
                            }

                            let scale = fov / (fov + actualZ * 20);
                            let px = width/2 + (x * scale);
                            
                            // Base terrain height + Audio spike
                            let yBase = height/2 + 50 + (actualZ * 12);
                            // Add a gentle rolling terrain
                            yBase += Math.sin(x*0.005 + timeTick*0.01) * 30;
                            
                            let py = yBase - (audioMod * scale);

                            if (first) { ctx.moveTo(px, py); first = false; }
                            else ctx.lineTo(px, py);
                        }
                        ctx.stroke();
                    }
                }
            }

            // 3. Void Galaxy Engine
            class GalaxyEngine {
                constructor() {}
                init() {
                    // Cache the heavy nebulas off-screen
                    this.offCanvas = document.createElement('canvas');
                    this.offCanvas.width = width; this.offCanvas.height = height;
                    const oCtx = this.offCanvas.getContext('2d');
                    
                    oCtx.fillStyle = '#020617';
                    oCtx.fillRect(0, 0, width, height);

                    // Deep static stars
                    oCtx.fillStyle = '#ffffff';
                    oCtx.globalAlpha = 0.3;
                    for(let i=0; i<1500; i++) {
                        oCtx.fillRect(Math.random()*width, Math.random()*height, 1, 1);
                    }

                    // Nebula Clouds
                    oCtx.globalCompositeOperation = 'screen';
                    for(let i=0; i<3; i++) {
                        let cx = Math.random()*width, cy = Math.random()*height;
                        let r = width * 0.4;
                        let grad = oCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
                        grad.addColorStop(0, state.colors[i+1] + '40'); // 40 hex opacity
                        grad.addColorStop(1, 'transparent');
                        oCtx.fillStyle = grad;
                        oCtx.beginPath(); oCtx.arc(cx, cy, r, 0, Math.PI*2); oCtx.fill();
                    }

                    // Foreground Parallax Stars
                    this.stars = [];
                    for(let i=0; i<400; i++) {
                        this.stars.push({
                            x: Math.random()*width, y: Math.random()*height, 
                            s: Math.random()*2+0.5, 
                            spd: Math.random()*0.3 + 0.1,
                            c: state.colors[Math.floor(Math.random()*4)]
                        });
                    }
                }
                update() {
                    this.stars.forEach(s => {
                        // Warp speed based on audio bass
                        let warp = state.audio ? getAudioBand(0, 10) * 2 * state.sensitivity : 0;
                        s.x -= (s.spd * state.velocity) + warp;
                        if(s.x < 0) s.x = width;
                    });
                }
                draw() {
                    ctx.globalAlpha = 1;
                    ctx.drawImage(this.offCanvas, 0, 0);
                    this.stars.forEach(s => {
                        ctx.fillStyle = s.c;
                        ctx.fillRect(s.x, s.y, s.s, s.s);
                    });
                }
            }

            // 4. Particle Engine (Wraps legacy Zen, Neural, Orbs)
            class ParticleEngine {
                constructor() {}
                init() {
                    this.particles = []; this.ripples = [];
                    for(let i=0; i<state.density; i++) {
                        this.particles.push({
                            x: Math.random()*width, y: Math.random()*height,
                            s: (state.theme === 'orbs') ? Math.random()*15+5 : Math.random()*2+1,
                            vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2,
                            c: state.colors[Math.floor(Math.random()*4)]
                        });
                    }
                }
                update() {
                    this.particles.forEach(p => {
                        let spd = state.velocity;
                        let dx = p.x - state.mouseX, dy = p.y - state.mouseY, dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 150) { p.x += (dx/dist)*2; p.y += (dy/dist)*2; }
                        p.x += p.vx * spd; p.y += p.vy * spd;
                        if(p.x < 0) p.x = width; if(p.x > width) p.x = 0;
                        if(p.y < 0) p.y = height; if(p.y > height) p.y = 0;
                    });
                }
                draw() {
                    if (state.theme === 'zen') {
                        if (Math.random() < 0.02 * state.velocity && this.ripples.length < 10) {
                            this.ripples.push({ x: Math.random()*width, y: Math.random()*height, r: 1, max: Math.random()*150+50, c: state.colors[Math.floor(Math.random()*4)] });
                        }
                        for (let i = this.ripples.length - 1; i >= 0; i--) {
                            let rip = this.ripples[i];
                            let audioBoost = state.audio ? (state.audioData[10]/255)*5*state.sensitivity : 0;
                            rip.r += (0.5 * state.velocity) + audioBoost;
                            ctx.beginPath(); ctx.strokeStyle = rip.c; ctx.globalAlpha = 0.5 * (1 - rip.r/rip.max);
                            ctx.lineWidth = 1.5; ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI*2); ctx.stroke();
                            if (rip.r >= rip.max) this.ripples.splice(i, 1);
                        }
                    } else {
                        this.particles.forEach((p, i) => {
                            ctx.fillStyle = p.c; ctx.beginPath();
                            if(state.theme === 'orbs') {
                                ctx.globalAlpha = 0.4;
                                ctx.arc(p.x, p.y, p.s * (1 + (state.audioData[0]/255)), 0, Math.PI*2);
                            } else {
                                ctx.globalAlpha = 0.8;
                                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                            }
                            ctx.fill();
                        });

                        if (state.theme === 'neural') {
                            ctx.lineWidth = 1;
                            for(let i=0; i<this.particles.length; i++) {
                                for(let j=i+1; j<this.particles.length; j++) {
                                    let p1 = this.particles[i], p2 = this.particles[j];
                                    let dx = p1.x - p2.x, dy = p1.y - p2.y, dist = Math.sqrt(dx*dx + dy*dy);
                                    let threshold = state.audio ? 100 + (state.audioData[i%20]/255)*100*state.sensitivity : 120;
                                    if(dist < threshold) {
                                        ctx.beginPath(); ctx.strokeStyle = state.colors[2];
                                        ctx.globalAlpha = (1 - dist/threshold) * 0.5;
                                        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // --- THE ENGINE REGISTRY ---
            const engines = {
                saturn: new SaturnEngine(),
                mesh: new MeshEngine(),
                galaxy: new GalaxyEngine(),
                zen: new ParticleEngine(),
                neural: new ParticleEngine(),
                orbs: new ParticleEngine()
            };

            let currentEngine = engines[state.theme];

            // --- TRANSITION STATE ---
            let isTransitioning = false;
            let globalAlpha = 1.0;
            let nextEngineKey = null;

            function switchTheme(newTheme) {
                if (newTheme === state.theme) return;
                nextEngineKey = newTheme;
                isTransitioning = true;
            }


            // --- UI BINDINGS ---
            let idleTimer;
            const ghostLayer = document.getElementById('ghostLayer');
            const cmdDeck = document.getElementById('commandDeck');
            let isMenuOpen = false;

            function resetIdleTimer() {
                ghostLayer.classList.remove('opacity-0');
                clearTimeout(idleTimer);
                idleTimer = setTimeout(() => { if (!isMenuOpen) ghostLayer.classList.add('opacity-0'); }, 3000);
            }
            window.addEventListener('mousemove', resetIdleTimer); window.addEventListener('click', resetIdleTimer);
            resetIdleTimer();

            document.getElementById('menuToggle').addEventListener('click', () => {
                isMenuOpen = !isMenuOpen;
                if(isMenuOpen) cmdDeck.classList.remove('-translate-x-[120%]');
                else { cmdDeck.classList.add('-translate-x-[120%]'); resetIdleTimer(); }
            });

            function updateTime() { document.getElementById('hudTime').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }
            setInterval(updateTime, 1000); updateTime();
            
            async function fetchWeather() {
                try {
                    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.95&longitude=-93.36&current=temperature_2m&temperature_unit=fahrenheit');
                    if(res.ok) {
                        const data = await res.json();
                        document.getElementById('hudWeatherTemp').textContent = `${Math.round(data.current.temperature_2m)}°F // LOCAL`;
                    }
                } catch(e) { console.warn("Weather fetch failed."); }
            }
            fetchWeather(); setInterval(fetchWeather, 600000);

            document.getElementById('themeSelect').addEventListener('change', e => switchTheme(e.target.value));
            document.getElementById('paletteSelect').addEventListener('change', e => { state.colors = palettes[e.target.value]; currentEngine.init(); });
            document.getElementById('sensitivitySlider').addEventListener('input', e => { state.sensitivity = parseFloat(e.target.value); document.getElementById('sensVal').textContent = state.sensitivity.toFixed(1) + 'x'; });
            document.getElementById('velocitySlider').addEventListener('input', e => { state.velocity = parseFloat(e.target.value); document.getElementById('velVal').textContent = state.velocity.toFixed(1) + 'x'; });
            document.getElementById('densitySlider').addEventListener('input', e => { state.density = parseInt(e.target.value); currentEngine.init(); });
            document.getElementById('togglePersistence').addEventListener('change', e => state.persistence = e.target.checked);
            document.getElementById('toggleBreath').addEventListener('change', e => state.breath = e.target.checked);

            document.getElementById('toggleAudio').addEventListener('change', async (e) => {
                if(e.target.checked) {
                    try {
                        mediaStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                        mediaStream.getVideoTracks().forEach(t => t.stop()); 
                        if (mediaStream.getAudioTracks().length === 0) throw new Error("NO_AUDIO");
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioCtx.createAnalyser();
                        audioCtx.createMediaStreamSource(mediaStream).connect(analyser);
                        analyser.fftSize = 256;
                        state.audio = true;
                        mediaStream.getAudioTracks()[0].onended = disableAudio;
                    } catch (err) { disableAudio(); }
                } else disableAudio();
            });

            function disableAudio() {
                if(audioCtx) audioCtx.suspend();
                if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                state.audio = false;
                document.getElementById('toggleAudio').checked = false;
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                Object.values(engines).forEach(engine => engine.init());
            }
            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', e => { state.mouseX = e.clientX; state.mouseY = e.clientY; });
            window.addEventListener('mouseleave', () => { state.mouseX = -1000; state.mouseY = -1000; });


            // --- MAIN RENDER LOOP ---
            function animate() {
                timeTick++;
                
                if(state.audio && analyser) analyser.getByteFrequencyData(state.audioData);
                else state.audioData.fill(0);

                // Transition Logic Coordinator
                if (isTransitioning) {
                    globalAlpha -= 0.05;
                    if (globalAlpha <= 0) {
                        globalAlpha = 0;
                        state.theme = nextEngineKey;
                        currentEngine = engines[state.theme];
                        currentEngine.init();
                        isTransitioning = false;
                    }
                } else if (globalAlpha < 1.0) {
                    globalAlpha = Math.min(1.0, globalAlpha + 0.05);
                }

                // Persistence Layer (Ghost Trails)
                if(state.persistence && state.theme !== 'saturn' && state.theme !== 'galaxy' && state.theme !== 'mesh') {
                    ctx.fillStyle = `rgba(2, 6, 23, 0.15)`;
                    ctx.fillRect(0, 0, width, height);
                } else {
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, width, height);
                }

                // Deep Breath Modifier
                let breathMod = state.breath ? 0.7 + Math.sin(timeTick * 0.02) * 0.3 : 1;
                ctx.globalAlpha = globalAlpha * breathMod;

                // Engine Execution
                currentEngine.update();
                currentEngine.draw();

                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            // Ignition
            resize(); 
            requestAnimationFrame(animate);

        })();
    </script>
</body>
</html>
