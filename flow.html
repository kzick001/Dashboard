<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Multiplexer v1.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'scanline': 'scanline 6s linear infinite',
                        'electric-pulse': 'electric-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(1000%)' }
                        },
                        'electric-pulse': {
                            '0%, 100%': { opacity: 1, borderColor: 'rgba(245, 158, 11, 0.6)', boxShadow: '0 0 10px rgba(245, 158, 11, 0.3)' },
                            '50%': { opacity: .6, borderColor: 'rgba(245, 158, 11, 0.2)', boxShadow: 'none' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: radial-gradient(circle at 50% 50%, #020617 0%, #0f172a 100%); }
        ::-webkit-scrollbar { display: none; }
        
        /* Custom Hardware Toggle Styles */
        .cyber-switch input:checked + div { background-color: currentColor; box-shadow: 0 0 15px currentColor; }
        .cyber-switch input:checked + div > div { transform: translateX(100%); background-color: #fff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-300">

    <div class="relative bg-slate-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-amber-500/20 p-6 hover-scale overflow-hidden group w-full max-w-4xl">
        
        <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-amber-500/5 to-transparent h-20 w-full animate-scanline opacity-20"></div>
        
        <a href="https://kzick001.github.io/dashboard/" class="absolute top-4 left-4 text-[10px] font-black text-amber-800 hover:text-amber-400 transition-colors tracking-tighter z-20">&larr; DASHBOARD</a>

        <div class="flex items-center space-x-3 mb-6 z-10 relative mt-4">
            <div class="w-8 h-8 flex items-center justify-center rounded bg-amber-950/60 border border-amber-500/30 group-hover:animate-electric-pulse transition-all">
                <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0v-5m0 0a3 3 0 110-6 3 3 0 010 6z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold truncate text-slate-100 font-sans tracking-tight">Saturn Multiplexer v1.6</h2>
        </div>

        <div id="loading-state" class="font-mono text-sm text-red-500 animate-pulse mb-4 z-10 relative">
            > Syncing secure pipeline... 
            <br>> Establishing isolated canvas context...
            <br>> Calibrating Z-Depth buffer...
        </div>

        <div id="app-core" class="hidden z-10 relative flex flex-col gap-6">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 p-5 bg-slate-950/80 rounded-lg border border-slate-800 shadow-inner">
                
                <div class="flex gap-6">
                    <label class="cyber-switch flex flex-col space-y-2 cursor-pointer group text-yellow-500">
                        <span class="font-mono text-[10px] text-slate-500 group-hover:text-yellow-500 transition-colors tracking-widest">YIELD: SINGULARITY</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="switch-yellow" class="sr-only">
                            <div class="block w-full h-full bg-slate-800 rounded-full border border-slate-700 transition-all duration-300">
                                <div class="absolute left-1 top-1 bg-slate-500 w-4 h-4 rounded-full transition-transform duration-300"></div>
                            </div>
                        </div>
                    </label>

                    <label class="cyber-switch flex flex-col space-y-2 cursor-pointer group text-red-600">
                        <span class="font-mono text-[10px] text-slate-500 group-hover:text-red-500 transition-colors tracking-widest">CRITICAL: EJECTION</span>
                        <div class="relative w-12 h-6">
                            <input type="checkbox" id="switch-red" class="sr-only">
                            <div class="block w-full h-full bg-slate-800 rounded-full border border-slate-700 transition-all duration-300">
                                <div class="absolute left-1 top-1 bg-slate-500 w-4 h-4 rounded-full transition-transform duration-300"></div>
                            </div>
                        </div>
                    </label>
                </div>

                <div class="flex flex-col space-y-2 w-full md:w-48">
                    <div class="flex justify-between font-mono text-[10px] text-slate-500 tracking-widest">
                        <span>CHROMA_SAT</span>
                        <span id="sat-val" class="text-amber-500 font-bold">70%</span>
                    </div>
                    <input type="range" id="slider-sat" min="0" max="100" value="70" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-amber-500">
                </div>
            </div>

            <div class="flex justify-between text-[10px] text-slate-500 font-mono px-2 border-b border-slate-800/50 pb-2">
                <span>SYS_VELOCITY: <span id="telemetry-vel" class="text-amber-400">0.10</span></span>
                <span>PEAK_DISTORTION: <span id="telemetry-dist" class="text-amber-400">0.00</span></span>
                <span>STATE: <span id="telemetry-state" class="text-emerald-400">NOMINAL</span></span>
            </div>

            <div class="relative w-full aspect-[21/9] bg-[#020617] rounded border border-slate-800 overflow-hidden shadow-inner">
                <canvas id="saturn-canvas" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('app-core').classList.remove('hidden');
                    initEngine();
                }, 800);
            });

            function initEngine() {
                const canvas = document.getElementById('saturn-canvas');
                const ctx = canvas.getContext('2d');
                const yellowSwitch = document.getElementById('switch-yellow');
                const redSwitch = document.getElementById('switch-red');
                const satSlider = document.getElementById('slider-sat');
                const satValText = document.getElementById('sat-val');
                
                const tVel = document.getElementById('telemetry-vel');
                const tDist = document.getElementById('telemetry-dist');
                const tState = document.getElementById('telemetry-state');

                let width, height, centerX, centerY;
                
                function resize() {
                    width = canvas.width = canvas.offsetWidth;
                    height = canvas.height = canvas.offsetHeight;
                    centerX = width / 2;
                    centerY = height / 2;
                }
                window.addEventListener('resize', resize);
                resize();

                satSlider.addEventListener('input', (e) => {
                    satValText.innerText = e.target.value + '%';
                });

                const rings = [];
                const ringCount = 16;
                for(let i = 0; i < ringCount; i++) {
                    rings.push({ baseRadius: 60 + (i * 15), phaseOffset: Math.random() * Math.PI * 2 });
                }

                let time = 0;

                function render() {
                    const isYellow = yellowSwitch.checked;
                    const isRed = redSwitch.checked;
                    
                    // Baseline Config
                    let config = {
                        wireframe: false,
                        scale: 1.0,
                        mass: 1,
                        velocity: 0.1, 
                        particleDensity: 40,
                        audioSensitivity: 1,
                        distortionMulti: 1
                    };

                    // Anomaly Overrides
                    if (isRed) {
                        config = { wireframe: true, scale: 1.8, mass: 3, velocity: 1.7, particleDensity: 100, audioSensitivity: 3, distortionMulti: 4 };
                        tState.innerText = "CATASTROPHIC";
                        tState.className = "text-red-500 animate-pulse";
                    } else if (isYellow) {
                        config = { wireframe: true, scale: 1.8, mass: 3, velocity: 0.2, particleDensity: 100, audioSensitivity: 3, distortionMulti: 4 };
                        tState.innerText = "SINGULARITY";
                        tState.className = "text-yellow-500";
                    } else {
                        tState.innerText = "NOMINAL";
                        tState.className = "text-emerald-400";
                    }

                    time += config.velocity * 0.05;
                    tVel.innerText = config.velocity.toFixed(2);

                    // Mock FFT Audio Pipeline
                    const audioData = rings.map((_, i) => {
                        const freqSim = Math.sin(time * 3 + i * 0.5) * 0.5 + 0.5;
                        return (freqSim + (Math.random() * 0.1)) * config.audioSensitivity;
                    });
                    const peakAmp = Math.max(...audioData);
                    tDist.innerText = (peakAmp * config.distortionMulti).toFixed(2);

                    const saturation = satSlider.value;

                    // Clear Canvas (Trail Effect)
                    ctx.fillStyle = `rgba(2, 6, 23, ${config.wireframe ? 1 : 0.3})`;
                    ctx.fillRect(0, 0, width, height);

                    const tilt = 0.35; // 3D Camera pitch

                    // Helper to generate orbital points for a ring
                    function getRingGeometry(ring, index) {
                        const points = [];
                        const currentRadius = (ring.baseRadius + (audioData[index] * 20)) * config.scale;
                        const distortion = peakAmp * config.distortionMulti * 15;
                        const segments = config.wireframe ? config.particleDensity : 60;
                        
                        for(let s = 0; s <= segments; s++) {
                            const angle = (s / segments) * Math.PI * 2;
                            const rotatedAngle = angle + (time * 0.5) + ring.phaseOffset;
                            
                            // Apply global peak distortion
                            const noise = Math.sin(angle * 6 + time * 2) * distortion;
                            const r = currentRadius + noise;
                            
                            // 3D coordinates (Orbiting on X/Z plane)
                            const x3d = Math.cos(rotatedAngle) * r;
                            const z3d = Math.sin(rotatedAngle) * r;
                            
                            // Project to 2D with tilt
                            const x2d = centerX + x3d;
                            const y2d = centerY + (z3d * tilt);
                            
                            points.push({ x: x2d, y: y2d, z: z3d });
                        }
                        return points;
                    }

                    // Render Pass Logic
                    function drawRingPass(points, index, isFront) {
                        const hue = (index * (360 / ringCount) + (time * 20)) % 360;
                        ctx.strokeStyle = `hsla(${hue}, ${saturation}%, 60%, ${config.wireframe ? 0.9 : 0.5})`;
                        ctx.lineWidth = config.wireframe ? 1 : 1.5 + (audioData[index] * 2);
                        
                        ctx.beginPath();
                        let isDrawing = false;
                        
                        for(let i = 0; i < points.length; i++) {
                            const p = points[i];
                            // Check depth to split front/back arcs (slight overlap at 0 to prevent visual gaps)
                            const shouldDraw = isFront ? p.z >= -1 : p.z < 1; 
                            
                            if (shouldDraw) {
                                if (!isDrawing) { ctx.moveTo(p.x, p.y); isDrawing = true; }
                                else { ctx.lineTo(p.x, p.y); }
                            } else {
                                isDrawing = false;
                            }
                        }
                        ctx.stroke();
                    }

                    // Pre-calculate geometry for this frame
                    const ringGeometries = rings.map((ring, i) => getRingGeometry(ring, i));

                    // PASS 1: BACKGROUND ARCS (Z < 0)
                    ringGeometries.forEach((points, i) => drawRingPass(points, i, false));

                    // PASS 2: THE ENTITY
                    const planetRadius = 35 * config.scale * config.mass;
                    if (config.wireframe) {
                        ctx.strokeStyle = '#f8fafc';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, planetRadius, 0, Math.PI * 2);
                        ctx.stroke();
                        // Tactical Crosshairs
                        ctx.beginPath();
                        ctx.moveTo(centerX - planetRadius - 15, centerY); ctx.lineTo(centerX + planetRadius + 15, centerY);
                        ctx.moveTo(centerX, centerY - planetRadius - 15); ctx.lineTo(centerX, centerY + planetRadius + 15);
                        ctx.stroke();
                    } else {
                        const gradient = ctx.createRadialGradient(
                            centerX - planetRadius * 0.3, centerY - planetRadius * 0.3, 0, 
                            centerX, centerY, planetRadius
                        );
                        gradient.addColorStop(0, '#475569'); // slate-600
                        gradient.addColorStop(0.8, '#0f172a'); // slate-900
                        gradient.addColorStop(1, '#020617'); // slate-950
                        
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, planetRadius, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Atmosphere Glow
                        ctx.strokeStyle = 'rgba(148, 163, 184, 0.2)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    // PASS 3: FOREGROUND ARCS (Z >= 0)
                    ringGeometries.forEach((points, i) => drawRingPass(points, i, true));

                    requestAnimationFrame(render);
                }

                render();
            }
        })();
    </script>
</body>
</html>
