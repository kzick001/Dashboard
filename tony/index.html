<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Kiosk V0.3.5</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' } },
                    animation: {
                        'blink': 'blink 1s step-start infinite'
                    },
                    keyframes: {
                        blink: { '50%': { opacity: '0' } }
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-black text-slate-200 overflow-hidden;
                width: 1440px; height: 900px; cursor: none;
            }
        }
        /* Pan animation removed to stop VideoCore IV thermal throttling */
        .bg-mesh {
            background: radial-gradient(circle at 20% 30%, rgba(15, 23, 42, 0.8), transparent 70%),
                        radial-gradient(circle at 80% 70%, rgba(2, 6, 23, 0.9), transparent 70%);
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="relative flex flex-col p-10">

    <div class="fixed inset-0 z-0 bg-black overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-mesh"></div>
    </div>

    <div class="z-10 flex justify-between items-center mb-8 border-b border-slate-800/60 pb-4">
        <div class="text-[10px] font-mono tracking-[0.3em] text-slate-500 uppercase">Raspberry Tony // V0.3.5 Stable</div>
        <div class="flex items-center gap-2">
            <span id="sys-status-dot" class="text-green-500 animate-blink">●</span> 
            <span id="sys-status-text" class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">System Online</span>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-8 z-10 flex-1 h-full">
        
        <div class="col-span-3 flex flex-col gap-6 relative h-full">
            <div class="flex flex-col">
                <div class="text-[7rem] font-light tracking-tighter text-white leading-none flex items-center">
                    <span id="comp-hour">--</span><span class="animate-blink opacity-40 mx-1">:</span><span id="comp-minute">--</span>
                </div>
                <div id="comp-date" class="text-lg font-mono text-cyan-500/80 tracking-widest uppercase mt-2">Awaiting Sync</div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2rem] p-6 flex flex-col shadow-xl">
                <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase mb-4 text-center">Current Conditions</div>
                <div class="flex items-center justify-center gap-6 mb-4">
                    <div id="current-icon" class="w-16 h-16 text-slate-200"></div>
                </div>
                <div class="flex items-end justify-center gap-4">
                    <span id="low-temp" class="text-3xl font-mono text-blue-500/80 pb-2">--°</span>
                    <span id="current-temp" class="text-7xl font-light text-white leading-none tracking-tighter">--°</span>
                    <span id="high-temp" class="text-3xl font-mono text-red-500/80 pb-2">--°</span>
                </div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2rem] p-6 flex flex-col gap-6 flex-1">
                <div class="flex justify-between items-center">
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-mono text-slate-600 tracking-widest uppercase">Wind</span>
                        <div class="flex items-center gap-2 text-white font-mono text-lg">
                            <svg id="wind-dir-icon" class="w-4 h-4 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-width="2.5" d="M12 2L16 10L12 8L8 10L12 2Z"></path></svg>
                            <span id="wind-speed">--</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-[9px] font-mono text-slate-600 tracking-widest uppercase text-right">Dew Point</span>
                        <span id="dew-point" class="text-white font-mono text-lg text-right">--°</span>
                    </div>
                </div>

                <div class="flex flex-col items-center py-4 border-y border-slate-800/50">
                    <span class="text-[9px] font-mono text-slate-600 tracking-widest uppercase mb-3">Air Quality Index</span>
                    <div class="relative w-24 h-24">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 128 128">
                            <circle cx="64" cy="64" r="58" fill="none" class="stroke-slate-800" stroke-width="6"></circle>
                            <circle id="aqi-ring" cx="64" cy="64" r="58" fill="none" class="stroke-slate-600 transition-colors duration-1000" stroke-width="6" stroke-dasharray="364" stroke-dashoffset="364" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="aqi-value" class="text-3xl font-bold text-white tracking-tighter">--</span>
                            <svg id="aqi-skull" class="w-5 h-5 text-purple-500 absolute -bottom-2 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h.01M15 12h.01M12 2a8 8 0 0 0-8 8c0 1.5.5 3 1.2 4.2L4 20h16l-1.2-5.8C19.5 13 20 11.5 20 10a8 8 0 0 0-8-8z"/><path d="M10 16v2m4-2v2"/></svg>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center text-sm mt-auto">
                    <div class="flex flex-col gap-1">
                        <span class="text-slate-500 font-mono tracking-widest text-[9px]">SUNRISE</span>
                        <span id="sunrise-time" class="text-white font-light text-base tracking-tight">--:--</span>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-slate-500 font-mono tracking-widest text-[9px]">SUNSET</span>
                        <span id="sunset-time" class="text-white font-light text-base tracking-tight">--:--</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full flex justify-center opacity-20 mix-blend-screen pointer-events-none">
                <img src="rt-logo.png" class="w-32 h-auto grayscale brightness-150" alt="RT Logo" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="col-span-5 flex flex-col gap-6">
            
            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2rem] p-6">
                <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase mb-4 border-b border-slate-800 pb-3">5 Day Forecast</div>
                <div id="forecast-container" class="flex justify-between items-center">
                    <script>
                        for(let i=1; i<=5; i++) {
                            document.write(`
                            <div id="forecast-slot-${i}" class="flex flex-col items-center gap-1.5 w-16">
                                <span id="forecast-day-${i}-name" class="text-[10px] font-mono text-slate-500">--</span>
                                <div id="forecast-day-${i}-icon" class="w-8 h-8 text-slate-400 my-1"></div>
                                <span id="forecast-day-${i}-temp" class="font-mono text-sm text-white">--°</span>
                                <span id="forecast-day-${i}-precip" class="text-[9px] font-mono text-blue-400/80">💧--%</span>
                                <span id="forecast-day-${i}-cloud" class="text-[9px] font-mono text-slate-500">☁️--%</span>
                                <span id="forecast-day-${i}-uv" class="text-[8px] font-mono text-orange-500/70 uppercase tracking-tighter">UV:--</span>
                            </div>`);
                        }
                    </script>
                </div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2rem] p-6 flex-1 flex flex-col min-h-0">
                <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase mb-4 border-b border-slate-800 pb-3 flex justify-between items-center">
                    <span>Sports Telemetry</span>
                    <span class="text-blue-500/60 animate-pulse">LIVE</span>
                </div>
                <div class="flex flex-col gap-3 overflow-hidden flex-1">
                    
                    <script>
                        const teamConfigs = [
                            {id: '15'}, {id: '9'}, {id: '10'}, {id: '8'},
                            {id: '275-fb'}, {id: '135-fb'}, {id: '275-mbb'}, {id: '275-wbb'}
                        ];
                        teamConfigs.forEach((t, index) => {
                            if(index === 4) document.write(`<div class="h-px bg-slate-800/50 my-1"></div>`);
                            document.write(`
                            <div id="sports-card-${t.id}" class="bg-slate-900/40 border-slate-800 border rounded-xl p-3 flex justify-between items-center hidden">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 bg-slate-800 rounded-full flex items-center justify-center overflow-hidden shrink-0">
                                        <img id="sports-logo-${t.id}" src="" class="w-6 h-6 object-contain hidden">
                                    </div>
                                    <div class="flex flex-col">
                                        <div class="flex items-baseline gap-2">
                                            <span id="sports-name-${t.id}" class="font-bold text-sm text-slate-200"></span>
                                            <span id="sports-record-${t.id}" class="text-[9px] font-mono text-slate-500"></span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span id="sports-opp-${t.id}" class="text-[10px] text-slate-400"></span>
                                            <span id="sports-prev-${t.id}" class="text-[9px] font-mono text-slate-600"></span>
                                            <span id="sports-broadcast-${t.id}" class="text-[8px] font-mono bg-slate-800 text-slate-300 px-1 py-0.5 rounded hidden"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right flex flex-col items-end">
                                    <span id="sports-score-${t.id}" class="font-mono text-sm text-white">--</span>
                                    <span id="sports-status-${t.id}" class="text-[9px] font-mono text-slate-500 uppercase mt-0.5">--</span>
                                </div>
                            </div>`);
                        });
                    </script>
                </div>
            </div>
        </div>

        <div class="col-span-4 flex flex-col gap-6">
            <div class="bg-slate-900/40 backdrop-blur-md border border-slate-700/30 rounded-[2rem] flex-1 overflow-hidden flex items-center justify-center relative shadow-inner p-2">
                <img src="tony-column.png" class="w-full h-full object-cover rounded-[1.5rem]" alt="Hardware Display" onerror="this.style.display='none'">
                
                <div class="absolute inset-0 flex items-center justify-center -z-10">
                    <span class="text-[10px] font-mono text-slate-700 tracking-widest uppercase">IMAGE SIGNAL LOST</span>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
